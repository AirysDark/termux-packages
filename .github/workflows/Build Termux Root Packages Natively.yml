name: Build Termux Root Packages Natively

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - dev
    paths:
      - 'root-packages/**'
      - 'scripts/**'

jobs:
  build-root-packages:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        arch: [aarch64, arm, i686, x86_64]
      fail-fast: false

    steps:
      # Step 1: Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Step 2: Ensure Python is installed
      - name: Ensure Python is available
        run: sudo apt-get update -y && sudo apt-get install -y python3 python3-pip python3-venv

      # Step 3: Setup Termux build environment
      - name: Setup Termux Build Environment
        run: |
          set -e
          set -o pipefail
          chmod +x ./scripts/setup-native-termux.sh
          ./scripts/setup-native-termux.sh 2>&1 | tee /tmp/setup-native-termux.log

      # Step 4: Generate build.sh files
      - name: Generate build.sh files
        run: |
          chmod +x ./scripts/setup-build-sh.sh
          ./scripts/setup-build-sh.sh 2>&1 | tee /tmp/setup-build-sh-build-sh.log

      # Step 5: Build only root-packages
      - name: Build root-packages for ${{ matrix.arch }}
        run: |
          chmod +x ./scripts/bin/update-packages
          ./scripts/bin/update-packages "root-packages" 2>&1 | tee /tmp/termux-build-${{ matrix.arch }}.log

      # Step 6: Archive built .deb files
      - name: Archive built .deb files
        run: |
          mkdir -p artifacts
          find output -type f -name '*.deb' -exec mv {} artifacts/ \; || true

      # Step 7: Upload built root-package artifacts
      - name: Upload built packages
        uses: actions/upload-artifact@v7
        with:
          name: termux-root-debs-${{ matrix.arch }}
          path: artifacts/

      # Step 8: Upload setup/build logs for debugging
      - name: Upload setup/build logs
        if: failure() || always()
        uses: actions/upload-artifact@v7
        with:
          name: termux-build-logs-${{ matrix.arch }}
          path: |
            /tmp/setup-native-termux.log
            /tmp/setup-build-sh-build-sh.log
            /tmp/termux-build-${{ matrix.arch }}.log
