name: Build Termux Package Builder Docker

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - dev
    paths:
      - 'scripts/**'
      - '.github/workflows/build-docker.yml'

jobs:
  build-docker:
    name: Build Docker Image Only
    runs-on: ubuntu-22.04
    steps:
      # Step 1: Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Step 2: Build the Docker image
      - name: Build Docker image
        run: |
          docker build -t package-builder:latest scripts/
          docker tag package-builder:latest ghcr.io/${{ github.repository_owner }}/package-builder:latest

      # Step 3: Login to GitHub Container Registry
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      # Step 4: Push Docker image to GHCR
      - name: Push Docker image to GHCR
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/package-builder:latest
