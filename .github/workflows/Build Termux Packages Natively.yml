name: Build Termux Packages Natively

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - dev
    paths:
      - 'packages/**'
      - 'root-packages/**'
      - 'x11-packages/**'
      - 'scripts/**'

jobs:
  build-packages:
    name: Build Termux Packages (${{ matrix.arch }})
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        arch: [aarch64, arm, i686, x86_64]
      fail-fast: false

    steps:
      # -----------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # -----------------------------------------
      - name: Cache Termux CGCT and partial build artifacts
        uses: actions/cache@v3
        with:
          path: |
            ~/.termux/tmp
            output
          key: termux-build-${{ matrix.arch }}-${{ hashFiles('packages/**', 'root-packages/**', 'x11-packages/**') }}
          restore-keys: |
            termux-build-${{ matrix.arch }}-

      # -----------------------------------------
      - name: Setup native Termux build environment
        run: |
          chmod +x ./scripts/setup-native-termux.sh
          ./scripts/setup-native-termux.sh 2>&1 | tee /tmp/setup_native_termux_${{ matrix.arch }}.log

      # -----------------------------------------
      - name: Free disk space
        run: ./scripts/free-space.sh || true

      # -----------------------------------------
      - name: Build packages for ${{ matrix.arch }}
        run: |
          ./scripts/bin/update-packages "@all" 2>&1 | tee /tmp/build_packages_${{ matrix.arch }}.log

      # -----------------------------------------
      - name: Archive built .deb files
        run: |
          mkdir -p artifacts
          find output -type f -name '*.deb' -exec mv {} artifacts/ \;

      # -----------------------------------------
      - name: Upload built packages as artifacts
        uses: actions/upload-artifact@v7
        with:
          name: termux-debs-${{ matrix.arch }}
          path: artifacts/

      # -----------------------------------------
      - name: Upload setup logs
        if: failure() || always()
        uses: actions/upload-artifact@v7
        with:
          name: setup-native-termux-log-${{ matrix.arch }}
          path: /tmp/setup_native_termux_${{ matrix.arch }}.log

      # -----------------------------------------
      - name: Upload build logs
        if: failure() || always()
        uses: actions/upload-artifact@v7
        with:
          name: build-packages-log-${{ matrix.arch }}
          path: /tmp/build_packages_${{ matrix.arch }}.log
