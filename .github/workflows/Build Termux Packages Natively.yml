name: Build Termux Packages Natively

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - dev
    paths:
      - 'packages/**'
      - 'root-packages/**'
      - 'x11-packages/**'
      - 'scripts/**'

jobs:
  build-packages:
    name: Build Termux Packages
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        arch: [aarch64, arm, i686, x86_64]
      fail-fast: false

    steps:
      # Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Free disk space (optional)
      - name: Free disk space
        run: ./scripts/free-space.sh || true

      # Setup native Termux build environment
      - name: Setup native Termux environment
        run: |
          chmod +x ./scripts/setup-native-termux.sh
          ./scripts/setup-native-termux.sh

      # Build packages
      - name: Build packages for ${{ matrix.arch }}
        run: ./scripts/bin/update-packages "@all" || true

      # Archive built .deb files
      - name: Archive built .deb files
        run: |
          mkdir -p artifacts
          find output -type f -name '*.deb' -exec mv {} artifacts/ \;

      # Upload built packages
      - name: Upload built packages as artifacts
        uses: actions/upload-artifact@v7
        with:
          name: termux-debs-${{ matrix.arch }}
          path: artifacts/

      # Upload CGCT build log if exists
      - name: Upload CGCT build log
        if: failure() || always()
        uses: actions/upload-artifact@v7
        with:
          name: cgct-build-log-${{ matrix.arch }}
          path: /tmp/cgct_build.log
